<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter for Lizzie</title>
  <style>
    :root {
      --primary: #fff;
      --bg-color: rgb(5, 53, 61);
      --bg-envelope-color: #f5edd1;
      --envelope-tab: #ecdeb8;
      --envelope-cover: #e6cfa7;
      --shadow-color: rgba(0, 0, 0, 0.2);
      --txt-color: #444;
      --heart-color: rgb(252, 8, 231);
    }

    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    .container {
      height: 100vh;
      display: grid;
      place-items: center;
    }

    .envelope-wrapper {
      background: var(--bg-envelope-color);
      box-shadow: 0 0 40px var(--shadow-color);
      cursor: pointer;
      position: relative;
    }

    .envelope {
      position: relative;
      width: 300px;
      height: 230px;
    }

    .envelope-wrapper .envelope::before {
      content: "";
      position: absolute;
      top: 0;
      z-index: 2;
      border-top: 130px solid var(--envelope-tab);
      border-right: 150px solid transparent;
      border-left: 150px solid transparent;
      transform-origin: top;
      transition: all 0.5s ease-in-out 0.7s;
      pointer-events: none;
    }

    .envelope-wrapper .envelope::after {
      content: "";
      position: absolute;
      z-index: 2;
      width: 0px;
      height: 0px;
      border-top: 130px solid transparent;
      border-right: 150px solid var(--envelope-cover);
      border-bottom: 100px solid var(--envelope-cover);
      border-left: 150px solid var(--envelope-cover);
    }

    .envelope .letter {
      position: absolute;
      right: 20%;
      bottom: 0;
      width: 54%;
      height: 80%;
      background: var(--primary);
      text-align: center;
      transition: all 1s ease-in-out;
      box-shadow: 0 0 5px var(--shadow-color);
      padding: 20px 10px;
      box-sizing: border-box;
      z-index: 1;
    }

    .envelope .letter .text {
      color: var(--txt-color);
      text-align: left;
      font-size: 10px;
      line-height: 1.4;
      word-break: break-word;
    }

    .heart {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 15px;
      height: 15px;
      background: var(--heart-color);
      z-index: 5;
      transform: translate(-50%, -20%) rotate(45deg);
      transition: transform 0.5s ease-in-out 1s;
      box-shadow: 0 1px 6px var(--shadow-color);
      pointer-events: none;
    }

    .heart:before,
    .heart:after {
      content: "";
      position: absolute;
      width: 15px;
      height: 15px;
      background-color: var(--heart-color);
      border-radius: 50%;
    }

    .heart:before {
      top: -7.5px;
    }

    .heart:after {
      right: 7.5px;
    }

    .flap .envelope:before {
      transform: rotateX(180deg);
      z-index: 0;
      transition-delay: 0s;
    }

    .flap .envelope .letter {
      bottom: 120px;
      transform: scale(1.5);
      transition-delay: 0.5s;
      z-index: 20;
    }

    .flap .heart {
      transform: rotate(90deg);
      transition-delay: 0.4s;
    }

    .butterfly-inside {
      display: inline-block;
      font-size: 20px;
      line-height: 1;
      text-decoration: none;
      color: var(--heart-color);
      font-weight: bold;
      margin-left: 4px;
      transition: transform 0.2s;
    }
    .butterfly-inside:hover {
      transform: scale(1.3);
      color: #ff44e6;
    }

    .letter .text p {
      margin: 8px 0 0 0;
      font-size: 9.5px;
    }
    .letter .text strong {
      font-size: 10px;
    }

    .letter {
      pointer-events: auto;
    }
    .envelope-wrapper {
      user-select: none;
    }
    .flap .envelope::before,
    .flap .envelope::after {
      pointer-events: none;
    }

    .letter a.butterfly-inside {
      position: relative;
      z-index: 30;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="envelope-wrapper">
      <div class="envelope">
        <div class="letter">
          <div class="text">
            <strong>Magandang Araw sa iyo Lizzie, Mahal ko</strong>
            <p>
              Sana habang binabasa mo ito ang letra na ito nakakain ka na nang maayos. Miss na miss na miss na kita : (
              <br><br>
              Pindutin ang Butterfly 
              <a href="question.html" class="butterfly-inside" title="open message">ʚїɞ</a>
            </p>
          </div>
        </div>
      </div>
      <div class="heart"></div>
    </div>
  </div>

  <script>
    (function() {
      const wrapper = document.querySelector('.envelope-wrapper');
      const letter = document.querySelector('.letter');

      wrapper.addEventListener('click', (e) => {
        if (!wrapper.classList.contains('flap')) {
          wrapper.classList.add('flap');
        }
      });

      letter.addEventListener('click', (event) => {
        event.stopPropagation(); 
      });
    })();
  </script>

</body>
</html>
